[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-agencee"
version = "0.1.0a0"
description = "Python SDK for the ai-agencee multi-agent framework"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
keywords = ["ai", "agents", "llm", "dag", "code-review", "security"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Quality Assurance",
]

# No runtime pip-installable dependencies.
# The only hard requirement is Node.js 20+ with ai-kit on PATH.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-mock>=3.0",
]

[project.urls]
Homepage = "https://github.com/binaryjack/ai-starter-kit"
Repository = "https://github.com/binaryjack/ai-starter-kit"
Issues = "https://github.com/binaryjack/ai-starter-kit/issues"

[tool.hatch.build.targets.wheel]
packages = ["ai_agencee"]

[tool.pytest.ini_options]
testpaths = ["tests"]
