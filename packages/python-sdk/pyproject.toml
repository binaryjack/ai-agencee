[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-agencee"
version = "0.2.0"
description = "Python SDK for the ai-agencee multi-agent framework"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
keywords = ["ai", "agents", "llm", "dag", "code-review", "security"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Quality Assurance",
]

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.6",
]

[project.optional-dependencies]
sse = [
    "httpx-sse>=0.4",
]
langchain = [
    "langchain-core>=0.2",
    "pydantic>=2.6",
]
langgraph = [
    "langgraph>=0.1",
]
all = [
    "httpx-sse>=0.4",
    "langchain-core>=0.2",
    "langgraph>=0.1",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.0",
    "respx>=0.21",
    "pydantic>=2.6",
]

[project.urls]
Homepage = "https://github.com/binaryjack/ai-starter-kit"
Repository = "https://github.com/binaryjack/ai-starter-kit"
Issues = "https://github.com/binaryjack/ai-starter-kit/issues"

[tool.hatch.build.targets.wheel]
packages = ["ai_agencee"]

[tool.pytest.ini_options]
testpaths = ["tests"]
