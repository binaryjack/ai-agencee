name: 'AI Code Review Kit'
description: >
  Run parallel AI code review, security scanning, and dependency auditing on
  every pull request.  Powered by Claude, GPT-4, Gemini, or local Ollama.

author: 'AI Starter Kit'

branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key for Claude models'
    required: false
    default: ''
  openai_api_key:
    description: 'OpenAI API key for GPT models'
    required: false
    default: ''
  gemini_api_key:
    description: 'Google Gemini API key'
    required: false
    default: ''
  ollama_host:
    description: 'Ollama host URL (e.g. http://localhost:11434) for local models'
    required: false
    default: ''
  dag_file:
    description: 'Path to a dag.json file relative to the repo root'
    required: false
    default: 'agents/dag.json'
  budget_usd:
    description: 'Maximum spend per run in USD'
    required: false
    default: '0.10'
  post_pr_comment:
    description: 'Post review summary as a PR comment (true/false)'
    required: false
    default: 'true'
  working_directory:
    description: 'Directory to analyse (relative to repo root)'
    required: false
    default: '.'

outputs:
  report_path:
    description: 'Path to the JSON report written by the run'
  status:
    description: 'Overall DAG run status: success | partial | failed'
  cost_usd:
    description: 'Actual spend in USD for this run'

runs:
  using: 'node20'
  main: 'dist/action/index.js'

